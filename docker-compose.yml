version: "3.8"

services:
    fastapi:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: fastapi-app
        ports:
            - "8000:8000"
        volumes:
            - .:/app
        environment:
            - ENVIRONMENT=development
        command: uvicorn main:app --reload --host 0.0.0.0 --port 8000

    nginx:
        image: nginx:latest
        container_name: nginx_proxy
        ports:
            - "80:80"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - fastapi