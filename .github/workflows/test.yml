name: test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
  container:
    image: python:3.12
  steps:
    - uses: actions/checkout@v4
      with:
        python-version: '3.12'
    - run: pip install --upgrade pip
    - run: pip install -r requirements.txt
    - run: pip list
    - run: pytest
