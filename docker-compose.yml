version: "3.8"

services:
    fastapi:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: fastapi-app
        expose:
            - "8000"
        volumes:
            - .:/app
        environment:
            - ENVIRONMENT=production
        command: uvicorn main:app --host 0.0.0.0 --port 8000

    nginx:
        image: nginx:latest
        container_name: nginx_proxy
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf
        ports:
            - "8080:8000"
        depends_on:
            - fastapi